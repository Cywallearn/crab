#=============================================================================
# Cywallearn - CRAB v1 Configuration File
#=============================================================================

# General Settings
CYWALLEARN_VERSION="1.0.0"
CYWALLEARN_CODENAME="CRAB"
CYWALLEARN_RELEASE_DATE="2025-06-26"
CYWALLEARN_AUTHOR="Cywallearn Team"

# Directories
INSTALL_DIR="$HOME/cywallearn"
TOOLS_DIR="$INSTALL_DIR/tools"
MODULES_DIR="$INSTALL_DIR/modules"
HELP_DIR="$INSTALL_DIR/help"
RESOURCES_DIR="$INSTALL_DIR/resources"
SESSION_DIR="$INSTALL_DIR/sessions"
BACKUP_DIR="$INSTALL_DIR/backup"
TMP_DIR="$INSTALL_DIR/tmp"

# Theme Settings
THEME_COLOR="green"
ENABLE_ASCII_BANNER=true
ENABLE_ANIMATIONS=true
ENABLE_LOGGING=true
LOG_LEVEL="normal"   # quiet, normal, verbose

# Terminal Settings
TERMINAL_HISTORY_SIZE=5000
TERMINAL_FONT_SIZE=14
ENABLE_AUTO_SUGGEST=true
ENABLE_SYNTAX_HIGHLIGHT=true

# Security Settings
AUTO_CLEAR_HISTORY=false
ENCRYPT_SESSIONS=false
HIDE_IP=true

# Network Settings
DEFAULT_TIMEOUT=30
DEFAULT_THREADS=50
PROXY_ENABLED=false
PROXY_TYPE="socks5"
PROXY_HOST="127.0.0.1"
PROXY_PORT="9050"

# Tool Settings
AUTO_UPDATE_TOOLS=true
CHECK_DEPENDENCIES=true
PARALLEL_EXECUTION=true
MAX_PARALLEL_JOBS=4

# Attack Modules
QUICK_ATTACK_MODE=false
AUTO_EXPLOIT_AGGRESSIVE=false
SAVE_ATTACK_LOGS=true

# Appearance
ENABLE_COLORS=true
BORDER_CHAR="═"
MENU_STYLE="modern"   # classic, modern, minimal
